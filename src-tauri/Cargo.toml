[package]
name = "videoforge"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
license = ""
repository = ""
edition = "2021"

# --- THIS SECTION IS CRITICAL FOR "app_lib" ERROR ---
[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]
# ----------------------------------------------------

[build-dependencies]
tauri-build = { version = "2.0.0", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
tauri = { version = "2.0.0", features = ["protocol-asset"] }
tauri-plugin-dialog = "2.0.0"
tauri-plugin-fs = "2.0.0"
anyhow = "1.0"
base64 = "0.21"
tokio = { version = "1", features = ["full"] }
zenoh = "1.0.2"
memmap2 = "0.9"

# Installer / Download Dependencies
reqwest = { version = "0.11", features = ["stream", "rustls-tls"] }
futures-util = "0.3"
zip = "0.6"
dirs = "5.0"
sysinfo = "0.30"
